name: fruitcheck
description: "Aplikasi klasifikasi kematangan buah bintaro."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.7
  tflite_flutter: ^0.11.0
  path_provider: ^2.1.2
  image: ^4.0.0
  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0  
  latlong2: ^0.9.0
  geolocator: ^10.0.0  
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/   

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-Bold.ttf
          weight: 700